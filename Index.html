<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaijaSensei</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
      background: #f5f7f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header { padding: 1rem 0; border-bottom: 2px solid #1a6b3f; }
    h1 { margin: 0; color: #1a6b3f; font-size: 1.75rem; }
    .tagline { color: #666; font-size: 0.9rem; margin-top: 0.25rem; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      margin: 1rem 0;
    }
    .msg {
      margin: 0.75rem 0;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user {
      background: #1a6b3f;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .bot {
      background: white;
      color: #222;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
      position: relative;
      padding-right: 2.5rem;
    }
    .bot.thinking { font-style: italic; color: #888; }
    .speak-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      opacity: 0.5;
      padding: 0.25rem;
    }
    .speak-btn:hover { opacity: 1; }
    form {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      background: white;
      border-radius: 12px;
      border: 1px solid #ddd;
      align-items: center;
    }
    input {
      flex: 1;
      padding: 0.75rem;
      font-size: 1rem;
      border: none;
      outline: none;
      background: transparent;
    }
    .mic-btn, .send-btn {
      padding: 0.5rem 1rem;
      background: #1a6b3f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .mic-btn { background: #555; }
    .mic-btn.listening {
      background: #c0392b;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    button:disabled { background: #aaa; cursor: not-allowed; animation: none; }
    .lang-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin: 0.5rem 0;
      font-size: 0.85rem;
      color: #666;
    }
    select {
      padding: 0.25rem 0.5rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>NaijaSensei</h1>
    <div class="tagline">Offline tutor for Nigerian students · Powered by Gemma 4</div>
  </header>

  <div class="lang-row">
    <label for="lang">Voice language:</label>
    <select id="lang">
      <option value="en-NG">English (Nigerian)</option>
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="yo-NG">Yoruba</option>
      <option value="ha-NG">Hausa</option>
      <option value="ig-NG">Igbo</option>
    </select>
    <label style="margin-left: 1rem;">
      <input type="checkbox" id="autospeak" /> Read replies aloud
    </label>
  </div>

  <div id="messages"></div>

  <form id="chat-form">
    <button type="button" id="mic" class="mic-btn" title="Speak your question">🎤</button>
    <input id="input" placeholder="Ask me anything... or tap the mic to speak" autocomplete="off" />
    <button type="submit" id="send" class="send-btn">Send</button>
  </form>

  <script>
    const messages = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const micBtn = document.getElementById("mic");
    const langSelect = document.getElementById("lang");
    const autoSpeak = document.getElementById("autospeak");

    const API = window.location.origin;
    const history = [];

    // ============ TEXT-TO-SPEECH ============
    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = langSelect.value;
      utter.rate = 0.95;
      window.speechSynthesis.speak(utter);
    }

    // ============ SPEECH-TO-TEXT ============
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onresult = (event) => {
        let transcript = "";
        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        input.value = transcript;
      };

      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove("listening");
        // Auto-send if we got a transcript
        if (input.value.trim()) {
          form.dispatchEvent(new Event("submit"));
        }
      };

      recognition.onerror = (e) => {
        console.error("Speech recognition error:", e.error);
        listening = false;
        micBtn.classList.remove("listening");
      };
    } else {
      micBtn.disabled = true;
      micBtn.title = "Speech recognition not supported in this browser. Use Chrome.";
    }

    micBtn.addEventListener("click", () => {
      if (!recognition) return;
      if (listening) {
        recognition.stop();
      } else {
        input.value = "";
        recognition.lang = langSelect.value;
        recognition.start();
        listening = true;
        micBtn.classList.add("listening");
      }
    });

    // ============ CHAT FUNCTION ============
    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "bot");
      div.textContent = text;

      // Add a speak button to bot replies
      if (role === "bot") {
        const speakBtn = document.createElement("button");
        speakBtn.className = "speak-btn";
        speakBtn.textContent = "🔊";
        speakBtn.title = "Read this aloud";
        speakBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          speak(div.dataset.fullText || div.textContent);
        });
        div.appendChild(speakBtn);
      }

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";
      sendBtn.disabled = true;
      micBtn.disabled = true;

      const botDiv = addMessage("bot", "");
      botDiv.classList.add("thinking");
      botDiv.textContent = "Thinking...";

      try {
        const response = await fetch(`${API}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, history }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullReply = "";
        let firstChunk = true;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payload = line.slice(6).trim();
            if (payload === "[DONE]") continue;
            try {
              const parsed = JSON.parse(payload);
              if (parsed.text) {
                if (firstChunk) {
                  botDiv.classList.remove("thinking");
                  botDiv.textContent = "";
                  firstChunk = false;
                }
                fullReply += parsed.text;
                botDiv.firstChild
                  ? (botDiv.firstChild.nodeValue = fullReply)
                  : botDiv.appendChild(document.createTextNode(fullReply));
                messages.scrollTop = messages.scrollHeight;
              }
            } catch (err) { /* skip malformed chunks */ }
          }
        }

        botDiv.dataset.fullText = fullReply;
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: fullReply });

        if (autoSpeak.checked) speak(fullReply);

      } catch (err) {
        botDiv.classList.remove("thinking");
        botDiv.textContent = "Error: " + err.message;
      } finally {
        sendBtn.disabled = false;
        micBtn.disabled = false;
        input.focus();
      }
    });

    input.focus();
  </script>
</body>
</html>
